<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <title>游资追踪</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body,
            html {
                height: 100%;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                overflow: hidden;
                background: #1a1a2e;
                color: #eee;
            }

            .container {
                display: flex;
                height: 100vh;
            }

            .nav {
                width: 160px;
                min-width: 160px;
                max-width: 320px;
                background: #16213e;
                display: flex;
                flex-direction: column;
                border-right: 1px solid #0f3460;
                position: relative;
            }

            .nav-header {
                padding: 16px 20px;
                border-bottom: 1px solid #0f3460;
            }

            .nav-header h1 {
                margin: 0 0 12px 0;
                font-size: 18px;
                font-weight: 600;
                color: #e94560;
            }

            .search-box {
                position: relative;
            }

            .search-box input {
                width: 100%;
                padding: 8px 12px 8px 32px;
                border: 1px solid #0f3460;
                border-radius: 6px;
                background: #1a1a2e;
                color: #eee;
                font-size: 13px;
                outline: none;
                transition: border-color 0.2s;
            }

            .search-box input:focus {
                border-color: #e94560;
            }

            .search-box input::placeholder {
                color: #666;
            }

            .search-box::before {
                content: '🔍';
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 12px;
            }

            .nav-list {
                flex: 1;
                overflow-y: auto;
                padding: 8px 0;
            }

            .nav-list::-webkit-scrollbar {
                width: 6px;
            }

            .nav-list::-webkit-scrollbar-track {
                background: transparent;
            }

            .nav-list::-webkit-scrollbar-thumb {
                background: #0f3460;
                border-radius: 3px;
            }

            .nav-list::-webkit-scrollbar-thumb:hover {
                background: #e94560;
            }

            .nav a {
                display: block;
                padding: 10px 20px;
                text-decoration: none;
                color: #a0a0a0;
                font-size: 13px;
                transition: all 0.15s;
                border-left: 3px solid transparent;
                cursor: pointer;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .nav a:hover {
                background: #0f3460;
                color: #fff;
            }

            .nav a.active {
                background: rgba(233, 69, 96, 0.15);
                color: #e94560;
                border-left-color: #e94560;
            }

            .nav a.visited {
                color: #6a6a8a;
                text-decoration: line-through;
            }

            .nav a.active.visited {
                color: #e94560;
                text-decoration: none;
            }

            .nav a.active.visited::before {
                content: none;
            }

            .resize-handle {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                width: 12px;
                cursor: col-resize;
                background: transparent;
                transition: background 0.2s;
                z-index: 10;
            }

            .resize-handle::after {
                content: '';
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 4px;
                height: 40px;
                background: transparent;
                border-radius: 2px;
                transition: background 0.2s;
            }

            .resize-handle:hover::after,
            .resize-handle.active::after {
                background: #e94560;
            }

            .resize-handle:hover,
            .resize-handle.active {
                background: rgba(233, 69, 96, 0.1);
            }

            .content {
                flex: 1;
                display: flex;
                flex-direction: column;
                background: #0f0f1a;
            }

            iframe {
                flex: 1;
                width: 100%;
                border: none;
                background: #fff;
            }
        </style>
    </head>

ml\"},{\"name\":\"量化基金\",\"link\":\"量化基金/龙虎榜票.html\"},{\"name\":\"iframe\",\"link\":\"iframe.html\"},{\"name\":\"天童南路\",\"link\":\"天童南路/龙虎榜票.html\"},{\"name\":\"方新侠\",\"link\":\"方新侠/龙虎榜票.html\"},{\"name\":\"沪股通专用\",\"link\":\"沪股通专用/龙虎榜票.html\"},{\"name\":\"落升(江南神鹰)\",\"link\":\"落升(江南神鹰)/龙虎榜票.html\"}]")
            var visited = new Set()
            var currentIndex = -1
            var filteredList = [...list]

            function renderList(filter) {
                var navList = document.getElementById('navList')
                var html = ''
                filteredList = filter
                    ? list.filter(function (item) {
                          return item.name.toLowerCase().includes(filter.toLowerCase())
                      })
                    : [...list]

                currentIndex = -1

                filteredList.forEach(function (item, index) {
                    var isVisited = visited.has(item.link)
                    html +=
                        '<a href="#" data-index="' +
                        index +
                        '" data-name="' +
                        item.link +
                        '" class="' +
                        (isVisited ? 'visited' : '') +
                        '" title="' +
                        item.name +
                        '" onclick="loadContent(\'' +
                        item.link +
                        '\', this)">' +
                        item.name +
                        '</a>'
                })

                navList.innerHTML = html || '<div style="padding:20px;color:#666;text-align:center">无匹配结果</div>'
            }

            function loadContent(url, dom) {
                document.getElementById('iframe').src = url

                visited.add(url)
                document.querySelectorAll('.nav a').forEach(function (a) {
                    if (visited.has(a.dataset.name)) a.classList.add('visited')
                    a.classList.remove('active')
                })
                if (dom) {
                    dom.classList.add('active')
                    dom.scrollIntoView({ block: 'center' })
                }

            }

            function refreshIframe() {
                var iframe = document.getElementById('iframe')
                iframe.src = iframe.src
            }

            function navigate(direction) {
                var links = document.querySelectorAll('.nav a')
                if (!links.length) return
                if (currentIndex >= 0) links[currentIndex].classList.remove('active')
                currentIndex = Math.max(0, Math.min(currentIndex + direction, links.length - 1))
                links[currentIndex].classList.add('active')
                links[currentIndex].scrollIntoView({ block: 'center' })
            }

            function openSelected() {
                var links = document.querySelectorAll('.nav a')
                if (currentIndex >= 0 && links[currentIndex]) {
                    links[currentIndex].click()
                }
            }

            document.getElementById('searchInput').addEventListener('input', function (e) {
                renderList(e.target.value)
            })

            document.addEventListener('keydown', function (e) {
                if (e.target.tagName === 'INPUT') return
                if (e.key === '/') {
                    e.preventDefault()
                    document.getElementById('searchInput').focus()
                }
            })

            
            var nav = document.getElementById('nav')
            var handle = document.getElementById('resizeHandle')
            var minWidth = 160
            var maxWidth = 320
            var isResizing = false
            var startX, startW

            handle.addEventListener('mousedown', function (e) {
                startX = e.clientX
                startW = nav.offsetWidth
                isResizing = true
                handle.classList.add('active')
                document.body.style.pointerEvents = 'none'
                document.body.style.cursor = 'col-resize'
                e.preventDefault()
            })

            document.addEventListener('mousemove', function (e) {
                if (!isResizing) return
                var diff = e.clientX - startX
                var newWidth = Math.max(minWidth, Math.min(maxWidth, startW + diff))
                nav.style.width = newWidth + 'px'
            })

            document.addEventListener('mouseup', function () {
                if (isResizing) {
                    isResizing = false
                    handle.classList.remove('active')
                    document.body.style.pointerEvents = ''
                    document.body.style.cursor = ''
                }
            })

            renderList()

            
            var params = new URLSearchParams(location.search)
            var autoName = params.get('name')
            if (autoName) {
                var match = list.find(function (item) { return item.name === autoName })
                if (match) {
                    var dom = document.querySelector('[data-name="' + match.link + '"]')
                    loadContent(match.link, dom)
                }
            }
            setTimeout(function () {
                var firstLink = document.querySelector('.nav a')
                if (firstLink && !autoName) firstLink.click()
            }, 0)
        </script>
